name: Generate XMLTV 7 Days

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run generator
        run: python epg.py

      - name: Commit update
        run: |
          git config user.name "epg-bot"
          git config user.email "bot@github.com"
          git add epg.xml
          git commit -m "update epg 7 days"
          git push
